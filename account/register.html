<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>إنشاء حساب — ITB3</title><link rel="stylesheet" href="../assets/css/style.css"></head>
<body class="font-arabic" style="background:var(--bg-gray)">
<div class="topbar"><div class="container"><div class="topbar-inner"><div class="topbar-right"><div class="lang-pill"><button class="lang-btn active" data-lang="ar">عربي</button><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="ku">کو</button></div></div></div></div></div>
<nav id="main-nav"><div class="container"><div class="nav-inner"><a href="../index.html" class="nav-logo-text">ITB<span>3</span></a><div class="nav-actions"><a href="../cart.html" class="nav-action-btn" style="position:relative"><span class="icon">🛒</span><span class="cart-count">0</span></a></div></div></div></nav>
<main>
<div class="auth-wrap">
  <div class="auth-logo"><a href="../index.html" class="nav-logo-text" style="font-size:2rem">ITB<span>3</span></a></div>
  <h2 class="auth-title" data-i18n="register_title"></h2>
  <form id="reg-form">
    <div class="form-group"><label class="form-label" data-i18n="full_name"></label><input class="form-input" type="text" id="r-name" required data-i18n-ph="full_name"></div>
    <div class="form-group"><label class="form-label" data-i18n="email"></label><input class="form-input" type="email" id="r-email" required data-i18n-ph="email"></div>
    <div class="form-group"><label class="form-label" data-i18n="phone"></label><input class="form-input" type="tel" id="r-phone" data-i18n-ph="phone"></div>
    <div class="form-group"><label class="form-label" data-i18n="password"></label><input class="form-input" type="password" id="r-pass" required minlength="6" data-i18n-ph="password"></div>
    <div class="form-group"><label class="form-label" data-i18n="confirm_pass"></label><input class="form-input" type="password" id="r-pass2" required data-i18n-ph="confirm_pass"></div>
    <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px" data-i18n="register_btn"></button>
  </form>
  <div id="reg-err" style="display:none;margin-top:12px;padding:10px;background:var(--primary-light);color:var(--primary);border-radius:8px;font-size:0.85rem;text-align:center"></div>
  <p class="auth-link" style="margin-top:16px"><span data-i18n="have_account"></span> <a href="login.html" data-i18n="sign_in"></a></p>
</div>
</main>
<script src="../assets/js/i18n.js"></script><script src="../assets/js/price-calc.js"></script><script src="../assets/js/cart.js"></script><script src="../assets/js/auth.js"></script><script src="../assets/js/app.js"></script>
<script>
if(Auth.isLoggedIn())window.location.href='dashboard.html';
document.getElementById('reg-form').addEventListener('submit',e=>{
  e.preventDefault();
  const name=document.getElementById('r-name').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const phone=document.getElementById('r-phone').value.trim();
  const pass=document.getElementById('r-pass').value;
  const pass2=document.getElementById('r-pass2').value;
  const err=document.getElementById('reg-err');
  if(pass!==pass2){err.style.display='block';err.textContent='كلمتا المرور غير متطابقتين';return;}
  const r=Auth.register(name,email,phone,pass);
  if(r.ok)window.location.href='dashboard.html';
  else{err.style.display='block';err.textContent='البريد الإلكتروني مستخدم مسبقاً';}
});
</script></body></html>
