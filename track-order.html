<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>تتبع الطلب — ITB3</title><link rel="stylesheet" href="assets/css/style.css"></head>
<body class="font-arabic">
<div class="topbar"><div class="container"><div class="topbar-inner"><div class="topbar-right"><div class="lang-pill"><button class="lang-btn active" data-lang="ar">عربي</button><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="ku">کو</button></div></div></div></div></div>
<nav id="main-nav"><div class="container"><div class="nav-inner"><button id="menu-toggle"><span></span><span></span><span></span></button><a href="index.html" class="nav-logo-text">ITB<span>3</span></a><div class="nav-actions"><a href="cart.html" class="nav-action-btn" style="position:relative"><span class="icon">🛒</span><span class="cart-count">0</span></a></div></div></div></nav>
<div id="mob-overlay"></div><aside id="mob-nav"><div class="mob-nav-head"><span class="nav-logo-text" style="font-size:1.2rem">ITB<span>3</span></span><button id="menu-toggle" style="font-size:1.3rem;color:#666">✕</button></div><nav class="mob-nav-links"><a href="index.html" class="mob-nav-link" data-i18n="nav_home"></a></nav></aside>
<main style="min-height:70vh;background:var(--bg-gray)">
<div class="container" style="padding:48px 0">
  <div style="max-width:540px;margin:0 auto;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:40px;box-shadow:var(--shadow)">
    <div style="text-align:center;margin-bottom:28px"><div style="font-size:2.5rem;margin-bottom:12px">📦</div><h1 style="font-size:1.4rem" data-i18n="track_title"></h1><p style="color:var(--text-muted);margin-top:6px" data-i18n="track_ph"></p></div>
    <div style="display:flex;gap:8px">
      <input class="form-input" type="text" id="track-in" data-i18n-ph="track_ph" style="flex:1">
      <button class="btn btn-primary" onclick="doTrack()" data-i18n="track_btn"></button>
    </div>
    <div id="track-result" style="display:none;margin-top:24px"></div>
  </div>
</div></main>
<footer class="footer"><div class="container"><div class="footer-bottom" style="border-top:1px solid rgba(255,255,255,0.1);padding-top:20px"><p>© 2025 ITB3. <span data-i18n="footer_rights"></span></p></div></div></footer>
<script src="assets/js/i18n.js"></script><script src="assets/js/price-calc.js"></script><script src="assets/js/cart.js"></script><script src="assets/js/auth.js"></script><script src="assets/js/app.js"></script>
<script>
async function doTrack(){
  const id=document.getElementById('track-in').value.trim();if(!id)return;
  const res=document.getElementById('track-result');res.style.display='block';res.innerHTML=`<p style="text-align:center;color:var(--text-muted)" data-i18n="loading">${i18n.t('loading')}</p>`;
  try{const r=await fetch('api/order.php?track='+encodeURIComponent(id));const d=await r.json();
  if(!d.found){res.innerHTML=`<p style="text-align:center;color:var(--text-muted);padding:16px">لم يُعثر على الطلب <strong>${id}</strong>. تأكد من الرقم أو <a href="contact.html" style="color:var(--primary)">تواصل معنا</a>.</p>`;return;}
  const steps=['pending','printing','finishing','ready','delivered'];const ci=steps.indexOf(d.status);
  const labels={pending:i18n.t('status_pending'),printing:i18n.t('status_printing'),finishing:i18n.t('status_finishing'),ready:i18n.t('status_ready'),delivered:i18n.t('status_delivered')};
  res.innerHTML=`<div style="background:var(--bg-gray);border-radius:var(--radius);padding:20px">
    <div style="display:flex;justify-content:space-between;margin-bottom:16px"><span style="font-weight:700">طلب رقم: <span style="color:var(--primary)">${id}</span></span><span style="font-size:0.8rem;color:var(--text-muted)">${d.date||''}</span></div>
    <div style="display:flex;flex-direction:column;gap:6px">${steps.map((s,i)=>`<div style="display:flex;gap:12px;padding:12px;border-radius:8px;background:${i===ci?'var(--primary-light)':i<ci?'rgba(22,163,74,0.05)':'#fff'};border:1.5px solid ${i===ci?'var(--primary)':i<ci?'rgba(22,163,74,0.3)':'var(--border)'}">
      <div style="width:20px;height:20px;border-radius:50%;background:${i<=ci?i===ci?'var(--primary)':'var(--green)':'var(--border)'};flex-shrink:0;margin-top:1px"></div>
      <span style="font-weight:${i===ci?'700':'500'};color:${i===ci?'var(--primary)':i<ci?'var(--green)':'var(--text-muted)'}">${labels[s]}</span>
    </div>`).join('')}</div></div>`;
  }catch{res.innerHTML=`<p style="text-align:center;color:var(--text-muted)">${i18n.t('error')}</p>`;}
}
document.getElementById('track-in').addEventListener('keydown',e=>{if(e.key==='Enter')doTrack();});
</script></body></html>
